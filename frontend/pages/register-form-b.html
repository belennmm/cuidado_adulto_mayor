<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />

    <link rel="stylesheet" href="./global.css" />
    <link rel="stylesheet" href="./register-form-b.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto Mono:wght@400;500;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Rounded Mplus 1c:wght@400;500;900&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=TT Hoves:wght@400;500&display=swap"
    />
  </head>
  <body>
    <div class="register-form-b">
      <main class="register-form">
        <div class="background"></div>
        <form class="register">
          <div class="register-child"></div>
          <div class="call-to-action">
            <h1 class="iniciemos">Iniciemos</h1>
            <div class="account-prompt">
              <h2 class="ya-tienes-cuenta">¿Ya tienes cuenta?</h2>
              <button class="inicia-sesin" type="submit" id="iniciaSesinText">
                Inicia Sesión
              </button>
            </div>
          </div>
          <div class="frame-parent">
            <div class="nombre-de-usuario-wrapper">
              <div class="nombre-de-usuario">Nombre de usuario</div>
            </div>
            <div class="rectangle-parent">
              <div class="frame-child"></div>
              <div class="user-type-options">
                <div class="user"></div>
              </div>
              <input
                class="nombre-de-usuario2"
                placeholder="Nombre de usuario"
                type="text"
              />
            </div>
          </div>
          <div class="frame-parent">
            <div class="nombre-de-usuario-wrapper">
              <div class="tipo-de-usuario">Tipo de usuario</div>
            </div>
            <div class="rectangle-group">
              <div class="frame-child"></div>
              <div class="seleccione-tipo-de">Seleccione tipo de usuario</div>
            </div>
          </div>
          <section class="location-details-parent">
            <div class="location-details">
              <div class="nombre-de-usuario-wrapper">
                <div class="locacin">Locación</div>
              </div>
              <div class="rectangle-group">
                <div class="frame-child"></div>
                <div class="seleccione-locacin">Seleccione locación</div>
              </div>
            </div>
            <div class="location-details">
              <div class="location-details-inner">
                <div class="fecha-de-nacimiento-parent">
                  <div class="fecha-de-nacimiento">Fecha de Nacimiento</div>
                  <div class="nmero-de-telfono">Número de teléfono</div>
                </div>
              </div>
              <div class="phone-details-parent">
                <div class="phone-details">
                  <div class="phone-details-child"></div>
                  <div class="mail-details">
                    <div class="mail"></div>
                  </div>
                  <div class="xx-xx-xxxx">xx-xx-xxxx</div>
                </div>
                <div class="phone-details2">
                  <div class="phone-details-child"></div>
                  <input
                    class="nombre-de-usuario2"
                    placeholder="Número de teléfono"
                    type="text"
                  />
                </div>
              </div>
            </div>
          </section>
          <div class="frame-container">
            <div class="nombre-de-usuario-wrapper">
              <div class="contrasea">Contraseña</div>
            </div>
            <div class="rectangle-container">
              <div class="frame-child"></div>
              <input
                class="ingrese-contrasea-10-32"
                placeholder="Ingrese Contraseña (10-32 caracteres)"
                type="text"
              />

              <div class="hide-password">
                <img class="hide-icon" alt="" src="./public/Hide@2x.png" />
              </div>
            </div>
          </div>
          <div class="email">
            <div class="email-child"></div>
            <img class="mail-icon" alt="" src="./public/Mail@2x.png" />

            <div class="email2">Email</div>
            <div class="email-address">Email Address</div>
          </div>
          <div class="sign-up-action">
            <button class="sign-up-button" type="submit" id="signUpButton">
              <div class="sign-up-button-child"></div>
              <div class="solicitar-acceso">Solicitar Acceso</div>
            </button>
          </div>
          <img class="user-icon" alt="" src="./public/User@2x.png" />

          <img
            class="name-tag-woman-horizontal"
            alt=""
            src="./public/Name-Tag-Woman-Horizontal@2x.png"
          />

          <img class="address-icon" alt="" src="./public/Address@2x.png" />

          <img class="calendar-icon" alt="" src="./public/Calendar@2x.png" />

          <img
            class="shake-phone-icon"
            alt=""
            src="./public/Shake-Phone@2x.png"
          />

          <img class="lock-icon" alt="" src="./public/Lock@2x.png" />
        </form>
      </main>
      <div class="canvas"></div>
      <div class="header">
        <img
          class="minus-icon"
          loading="lazy"
          alt=""
          src="./public/Minus@2x.png"
        />

        <div class="header-background-wrapper">
          <button class="header-background"></button>
        </div>
        <img
          class="minus-icon"
          loading="lazy"
          alt=""
          src="./public/Multiply@2x.png"
        />
      </div>
    </div>

    <script>
      var iniciaSesinText = document.getElementById("iniciaSesinText");
      if (iniciaSesinText) {
        iniciaSesinText.addEventListener("click", function (e) {
      
        });
      }
      
      var signUpButton = document.getElementById("signUpButton");
      if (signUpButton) {
        signUpButton.addEventListener("click", function (e) {
          
        });
      }
      </script>
  </body>
</html>
