<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Account Settings</title>

    <link rel="stylesheet" href="../../css/global.css" />
    <link rel="stylesheet" href="../../css/admin/admin-layout.css" />
    <link rel="stylesheet" href="../../css/admin/user-settings.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap"
    />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="admin-layout">
      <aside class="sidebar">
        <div class="sidebar-top"></div>

        <nav class="sidebar-nav">
          <a href="./home-page.html" class="nav-icon" data-label="Inicio">
            <i class="bx bxs-home"></i>
          </a>

          <a href="./dashboard.html" class="nav-icon" data-label="Dashboard">
            <i class="bx bxs-dashboard"></i>
          </a>

          <a href="./users.html" class="nav-icon" data-label="Usuarios">
            <i class="bx bxs-user"></i>
          </a>

          <a href="./shifts.html" class="nav-icon" data-label="Turnos">
            <i class="bx bxs-time"></i>
          </a>

          <a href="./adultos-mayores.html" class="nav-icon" data-label="Adultos mayores">
            <i class="bx bxs-id-card"></i>
          </a>

          <a href="./incidents.html" class="nav-icon" data-label="Incidentes">
            <i class="bx bxs-error"></i>
          </a>

          <a href="./routines.html" class="nav-icon" data-label="Rutinas">
            <i class="bx bxs-star"></i>
          </a>

          <a href="./settings.html" class="nav-icon" data-label="Configuración">
            <i class="bx bxs-cog"></i>
          </a>
        </nav>

        <div class="sidebar-bottom">
          <a href="./user-settings.html" class="nav-icon active" data-label="Perfil">
            <i class="bx bx-user-circle"></i>
          </a>

          <a href="../../index.html" class="nav-icon" data-label="Cerrar sesión">
            <i class="bx bx-log-out"></i>
          </a>
        </div>
      </aside>

      <main class="admin-main">
        <div class="admin-topbar"></div>

        <section class="page-shell account-settings-page">
          <div class="page-header">
            <h1 class="page-title">Configuración de la Cuenta</h1>
          </div>

          <form class="settings-form" id="accountSettingsForm">
            <section class="settings-card profile-summary">
              <div class="profile-avatar">
                <i class="bx bxs-user"></i>
              </div>

              <div class="profile-summary-text">
                <h2 id="profileName">Administrador</h2>
                <p id="profileRole">Administrador</p>
                <span id="profileEmail">admin@correo.com</span>
              </div>
            </section>

            <div class="settings-grid">
              <section class="settings-card">
                <h2 class="section-title">Información personal</h2>

                <div class="form-grid">
                  <div class="form-group">
                    <label for="fullName">Nombre completo</label>
                    <input type="text" id="fullName" name="fullName" placeholder="Ingrese nombre completo" />
                  </div>

                  <div class="form-group">
                    <label for="username">Nombre de usuario</label>
                    <input type="text" id="username" name="username" placeholder="Ingrese nombre de usuario" />
                  </div>

                  <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="Ingrese correo electrónico" />
                  </div>

                  <div class="form-group">
                    <label for="phone">Número de teléfono</label>
                    <input type="tel" id="phone" name="phone" placeholder="Ingrese número de teléfono" />
                  </div>

                  <div class="form-group">
                    <label for="location">Locación</label>
                    <input type="text" id="location" name="location" placeholder="Ingrese locación" />
                  </div>

                  <div class="form-group">
                    <label for="birthdate">Fecha de nacimiento</label>
                    <input type="date" id="birthdate" name="birthdate" />
                  </div>
                </div>
              </section>

              <section class="settings-card">
                <h2 class="section-title">Seguridad y acceso</h2>

                <div class="form-grid single-column">
                  <div class="form-group">
                    <label for="role">Rol</label>
                    <input type="text" id="role" name="role" readonly />
                  </div>

                  <div class="form-group">
                    <label for="currentPassword">Contraseña actual</label>
                    <div class="password-input-wrap">
                      <input type="password" id="currentPassword" name="currentPassword" placeholder="Ingrese contraseña actual" />
                      <button type="button" class="toggle-password" data-target="currentPassword">
                        <i class="bx bx-hide"></i>
                      </button>
                    </div>
                  </div>

                  <div class="form-group">
                    <label for="newPassword">Nueva contraseña</label>
                    <div class="password-input-wrap">
                      <input type="password" id="newPassword" name="newPassword" placeholder="Ingrese nueva contraseña" />
                      <button type="button" class="toggle-password" data-target="newPassword">
                        <i class="bx bx-hide"></i>
                      </button>
                    </div>
                  </div>

                  <div class="form-group">
                    <label for="confirmPassword">Confirmar nueva contraseña</label>
                    <div class="password-input-wrap">
                      <input type="password" id="confirmPassword" name="confirmPassword" placeholder="Confirme nueva contraseña" />
                      <button type="button" class="toggle-password" data-target="confirmPassword">
                        <i class="bx bx-hide"></i>
                      </button>
                    </div>
                  </div>
                </div>
              </section>
            </div>

            <div class="form-actions">
              <button type="submit" class="primary-button">Guardar cambios</button>
            </div>
          </form>
        </section>
      </main>
    </div>

    <script src="../../js/admin/user-settings.js"></script>
  </body>
</html>
