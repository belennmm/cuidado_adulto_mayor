<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Turnos</title>

    <link rel="stylesheet" href="../../css/global.css" />
    <link rel="stylesheet" href="../../css/admin/admin-layout.css" />
    <link rel="stylesheet" href="../../css/admin/shifts.css" />
    <link rel="stylesheet" href="../../css/logout-modal.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap"
    />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="admin-layout">
      <aside class="sidebar">
        <div class="sidebar-top"></div>

        <nav class="sidebar-nav">
          <a href="./home-page.html" class="nav-icon" data-label="Inicio">
            <i class="bx bxs-home"></i>
          </a>
          <a href="./dashboard.html" class="nav-icon" data-label="Dashboard">
            <i class="bx bxs-dashboard"></i>
          </a>
          <a href="./users.html" class="nav-icon" data-label="Usuarios">
            <i class="bx bxs-user"></i>
          </a>
          <a href="./shifts.html" class="nav-icon active" data-label="Turnos">
            <i class="bx bxs-time"></i>
          </a>
          <a href="./adultos-mayores.html" class="nav-icon" data-label="Adultos mayores">
            <i class="bx bxs-id-card"></i>
          </a>
          <a href="./incidents.html" class="nav-icon" data-label="Incidentes">
            <i class="bx bxs-error"></i>
          </a>
          <a href="./routines.html" class="nav-icon" data-label="Rutinas">
            <i class="bx bxs-star"></i>
          </a>
          <a href="./settings.html" class="nav-icon" data-label="Configuración">
            <i class="bx bxs-cog"></i>
          </a>
        </nav>

        <div class="sidebar-bottom">
          <a href="./user-settings.html" class="nav-icon" data-label="Perfil">
            <i class="bx bx-user-circle"></i>
          </a>
          
          <a href="#" class="nav-icon logout-trigger" data-label="Cerrar sesión">
            <i class="bx bx-log-out"></i>
          </a>
        </div>
      </aside>

      <main class="admin-main">
        <div class="admin-topbar"></div>

        <section class="page-shell shifts-page">
          <div class="shifts-header">
            <div>
              <h1 class="shifts-title">Turnos</h1>
              <p class="shifts-subtitle">Asignacion semanal para cuidadores profesionales.</p>
            </div>
          </div>

          <section class="shift-panel">
            <form class="shift-form" id="shiftForm">
              <div class="form-field">
                <label for="caregiverSelect">Cuidador</label>
                <select id="caregiverSelect" required>
                  <option value="">Seleccionar cuidador</option>
                </select>
              </div>

              <div class="form-field">
                <label for="daySelect">Dia</label>
                <select id="daySelect" required>
                  <option value="1">Lunes</option>
                  <option value="2">Martes</option>
                  <option value="3">Miercoles</option>
                  <option value="4">Jueves</option>
                  <option value="5">Viernes</option>
                  <option value="6">Sabado</option>
                  <option value="0">Domingo</option>
                </select>
              </div>

              <div class="form-field compact-field">
                <label for="startTime">Inicio</label>
                <input type="time" id="startTime" required />
              </div>

              <div class="form-field compact-field">
                <label for="endTime">Fin</label>
                <input type="time" id="endTime" required />
              </div>

              <div class="form-field notes-field">
                <label for="shiftNotes">Notas</label>
                <input type="text" id="shiftNotes" maxlength="255" placeholder="Opcional" />
              </div>

              <button type="submit" class="assign-shift-button">
                Asignar
              </button>
            </form>

            <p class="form-message" id="shiftMessage" aria-live="polite"></p>
          </section>

          <section class="shifts-table-card">
            <div class="shifts-table-head">
              <span>Cuidador</span>
              <span>Dia</span>
              <span>Horario</span>
              <span>Notas</span>
              <span>Solicitud</span>
              <span>Accion</span>
            </div>

            <div class="shifts-table-body" id="shiftsTableBody"></div>
          </section>

          <section class="vacations-table-card">
            <div class="shifts-header">
              <div>
                <h2 class="vacations-title">Solicitudes de vacaciones</h2>
                <p class="shifts-subtitle">Revision de dias libres para cuidadores profesionales.</p>
              </div>
            </div>

            <div class="vacations-table-head">
              <span>Cuidador</span>
              <span>Fechas</span>
              <span>Motivo</span>
              <span>Estado</span>
              <span>Accion</span>
            </div>

            <div class="vacations-table-body" id="vacationsTableBody"></div>
          </section>
        </section>
      </main>
    </div>

    <div class="logout-modal-overlay" id="logoutModal">
      <div class="logout-modal-box">
        <h3 class="logout-modal-title">Cerrar sesión</h3>
        <p class="logout-modal-text">¿Seguro que deseas cerrar sesión?</p>

        <div class="logout-modal-actions">
          <button type="button" class="logout-cancel-button" id="cancelLogout">
            Cancelar
          </button>
          <button type="button" class="logout-confirm-button" id="confirmLogout">
            Aceptar
          </button>
        </div>
      </div>
    </div>

  
  <script src="../../js/app-loading.js"></script>
  <script src="../../js/logout-modal.js"></script>
  <script src="../../js/admin/shifts.js"></script>


  </body>
</html>
