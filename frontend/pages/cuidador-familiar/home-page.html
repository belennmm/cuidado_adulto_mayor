<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inicio Cuidador Familiar</title>

    <link rel="stylesheet" href="../../css/global.css" />
    <link rel="stylesheet" href="../../css/cuidador-familiar/familiar-layout.css" />
    <link rel="stylesheet" href="../../css/cuidador-familiar/familiar-pages.css" />
    <link rel="stylesheet" href="../../css/cuidador-familiar/home-page.css" />
    <link rel="stylesheet" href="../../css/logout-modal.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap"
    />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="familiar-home">
      <aside class="sidebar">
        <div class="sidebar-top"></div>

        <nav class="sidebar-nav">
          <a href="./home-page.html" class="nav-icon" data-label="Inicio">
            <i class="bx bxs-dashboard"></i>
          </a>

          <a href="./adulto-mayor.html" class="nav-icon" data-label="Adulto mayor">
            <i class="bx bxs-id-card"></i>
          </a>

          <a href="./routine.html" class="nav-icon" data-label="Rutina">
            <i class="bx bxs-star"></i>
          </a>

          <a href="./incidents.html" class="nav-icon" data-label="Incidentes">
            <i class="bx bxs-error"></i>
          </a>
        </nav>

        <div class="sidebar-bottom">
          <a href="./user-settings.html" class="nav-icon" data-label="Perfil">
            <i class="bx bx-user-circle"></i>
          </a>

          <a href="#" class="nav-icon logout-trigger" data-label="Cerrar sesion">
            <i class="bx bx-log-out"></i>
          </a>
        </div>
      </aside>

      <main class="main-content">
        <section class="family-home-hero">
          <div class="family-home-content">
            <h1 class="family-home-title">Bienvenido</h1>
            <p class="family-home-message" id="familiarMessageText">
              Cuidar a quienes una vez nos cuidaron es uno de los mayores honores.
            </p>

            <div class="family-home-actions">
              <a href="./incidents.html" class="family-events-button">Ver eventos</a>
            </div>
          </div>
        </section>
      </main>
    </div>

    <div class="logout-modal-overlay" id="logoutModal">
      <div class="logout-modal-box">
        <h3 class="logout-modal-title">Cerrar sesi&oacute;n</h3>
        <p class="logout-modal-text">&iquest;Seguro que deseas cerrar sesi&oacute;n?</p>

        <div class="logout-modal-actions">
          <button type="button" class="logout-cancel-button" id="cancelLogout">
            Cancelar
          </button>
          <button type="button" class="logout-confirm-button" id="confirmLogout">
            Aceptar
          </button>
        </div>
      </div>
    </div>

    <script src="../../js/logout-modal.js"></script>
    <script src="../../js/auth-guard-familiar.js"></script>
    <script src="../../js/sidebar-active.js"></script>
    <script src="../../js/cuidador-familiar/home-page.js"></script>
  </body>
</html>
