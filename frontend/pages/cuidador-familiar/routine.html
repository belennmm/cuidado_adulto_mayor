<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Rutina Cuidador Familiar</title>

    <link rel="stylesheet" href="../../css/global.css" />
    <link rel="stylesheet" href="../../css/cuidador-familiar/familiar-layout.css" />
    <link rel="stylesheet" href="../../css/cuidador-familiar/familiar-pages.css" />
    <link rel="stylesheet" href="../../css/logout-modal.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600;700&display=swap"
    />
    <link
      href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="familiar-home">
      <aside class="sidebar">
        <div class="sidebar-top"></div>

        <nav class="sidebar-nav">
          <a href="./home-page.html" class="nav-icon" data-label="Inicio">
            <i class="bx bxs-dashboard"></i>
          </a>

          <a href="./adulto-mayor.html" class="nav-icon" data-label="Adulto mayor">
            <i class="bx bxs-id-card"></i>
          </a>

          <a href="./routine.html" class="nav-icon" data-label="Rutina">
            <i class="bx bxs-star"></i>
          </a>

          <a href="./incidents.html" class="nav-icon" data-label="Incidentes">
            <i class="bx bxs-error"></i>
          </a>
        </nav>

        <div class="sidebar-bottom">
          <a href="./user-settings.html" class="nav-icon" data-label="Perfil">
            <i class="bx bx-user-circle"></i>
          </a>

          <a href="#" class="nav-icon logout-trigger" data-label="Cerrar sesion">
            <i class="bx bx-log-out"></i>
          </a>
        </div>
      </aside>

      <main class="main-content">
        <section class="routine-prototype">
          <aside class="routine-blue-panel">
            <h1>Rutina:<br /><span id="routineResidentName">Adulto mayor</span></h1>
            <a href="./adulto-mayor.html" class="prototype-back">
              <i class="bx bx-chevron-left"></i>
              Atras
            </a>
          </aside>

          <section class="routine-detail-panel">
            <label class="adult-selector routine-adult-selector" id="routineAdultSelectorWrapper" hidden>
              <span>Seleccionar adulto mayor</span>
              <select id="routineAdultSelector" class="prototype-field"></select>
            </label>

            <div class="routine-form-row">
              <label>
                <span>Nombre Adulto Mayor</span>
                <input class="prototype-field" id="routineAdultName" type="text" readonly />
              </label>

              <label class="routine-date-field">
                <span>Dia</span>
                <input class="prototype-field" id="routineDateInput" type="text" readonly />
              </label>
            </div>

            <h2 class="prototype-title routine-section-title">Historial de actividades</h2>
            <div class="activity-history-card" id="activityHistoryList"></div>

            <div class="routine-bottom-grid">
              <section>
                <h2 class="prototype-title">Medicinas</h2>
                <div class="medicine-table-card">
                  <table class="medicine-table">
                    <thead>
                      <tr>
                        <th>Medicina</th>
                        <th>Horario</th>
                        <th>Estado</th>
                      </tr>
                    </thead>
                    <tbody id="routineMedicineTableBody"></tbody>
                  </table>
                </div>
              </section>

              <section class="routine-notes-panel">
                <label>
                  <span>Notas</span>
                  <textarea class="prototype-textarea" id="routineNotes" readonly></textarea>
                </label>

                <a href="./adulto-mayor.html" class="review-link">Revisar</a>
              </section>
            </div>
          </section>
        </section>
      </main>
    </div>

    <div class="logout-modal-overlay" id="logoutModal">
      <div class="logout-modal-box">
        <h3 class="logout-modal-title">Cerrar sesi&oacute;n</h3>
        <p class="logout-modal-text">&iquest;Seguro que deseas cerrar sesi&oacute;n?</p>

        <div class="logout-modal-actions">
          <button type="button" class="logout-cancel-button" id="cancelLogout">
            Cancelar
          </button>
          <button type="button" class="logout-confirm-button" id="confirmLogout">
            Aceptar
          </button>
        </div>
      </div>
    </div>

  <script src="../../js/app-loading.js"></script>
  <script src="../../js/logout-modal.js"></script>
    <script src="../../js/auth-guard-familiar.js"></script>
    <script src="../../js/sidebar-active.js"></script>
    <script src="../../js/cuidador-familiar/family-api.js"></script>
    <script src="../../js/cuidador-familiar/routine.js"></script>
  </body>
</html>
