<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />

    <link rel="stylesheet" href="./css/global.css" />
    <link rel="stylesheet" href="./css/login.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;600&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Roboto Mono:wght@400;500;700&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Rounded Mplus 1c:wght@400;500;900&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=TT Hoves:wght@400;500&display=swap"
    />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inria Sans:wght@700&display=swap"
    />
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">
  </head>
  <body>
    <div class="login-form">
      <div class="login-form-child"></div>
      <main class="frame-parent">
        <form class="rectangle-parent">
          <div class="frame-child"></div>
          <div class="inicia-sesin-parent">
            <h1 class="inicia-sesin">Inicia Sesión</h1>
            <div class="dont-have-account-parent">
              <h2 class="dont-have-account">¿No tienes cuenta?</h2>
              <div class="solicitar-cuenta">
                <button
                    class="solicitar-cuenta2"
                    type="button"
                    id="solicitarCuentaText"
                    >
                    Solicitar Cuenta
                    </button>
              </div>
            </div>
          </div>
          <div class="frame-group">
            <div class="usuario-wrapper">
              <div class="usuario">Usuario</div>
            </div>
            <div class="rectangle-group">
              <div class="frame-item"></div>
              <div class="user-wrapper">
                <i class='bx bx-user input-icon'></i>
              </div>
              <input
                class="ingrese-usuario"
                placeholder="Ingrese Usuario"
                type="text"
              />
            </div>
          </div>
          <div class="frame-container">
            <div class="usuario-wrapper">
                <div class="contrasea">Contraseña</div>
            </div>

            <div class="rectangle-container">
                <div class="lock-icon-container-parent">
                <div class="lock-icon-container">
                    <i class='bx bx-lock-alt input-icon'></i>
                </div>

                <input
                    class="ingrese-contrasea"
                    placeholder="Ingrese Contraseña"
                    type="password"
                    id="passwordInput"
                />
                </div>

                <div class="password-visibility-button">
                <i class='bx bx-hide input-icon small-icon' id="togglePassword"></i>
                </div>
            </div>
            </div>
          <div class="login-button-wrapper">
            <button class="login-button" type="submit" id="loginButton1">
              <div class="login-button-child"></div>
              <div class="iniciar-sesin">Iniciar Sesión</div>
            </button>
          </div>
        </form>
        <section class="canvas-parent">
          <div class="canvas"></div>
          <div class="close-option-icons">
            
          </div>
          <div class="user-type-buttons-wrapper">
            <div class="user-type-buttons">
            
            </div>
          </div>
        </section>
      </main>
    </div>

   <script src="./js/index.js"></script>
  </body>
</html>
